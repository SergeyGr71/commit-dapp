<!DOCTYPE html>
<html>
<head>
  <title>Commit App</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    .container {
      width: 400px;
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
    }

    h1 {
      margin-bottom: 10px;
    }

    h2 {
      margin-top: 20px;
    }

    p {
      color: #94a3b8;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 6px;
      border: none;
    }

    button {
      padding: 10px;
      margin: 5px 0;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .create {
      background: #22c55e;
      color: white;
      width: 100%;
    }

    .load {
      background: #3b82f6;
      color: white;
      width: 100%;
    }

    li {
      background: #334155;
      margin-top: 10px;
      padding: 10px;
      border-radius: 6px;
    }

    .actions button {
      margin-right: 5px;
    }
  </style>
</head>
<body>

<div class="container">

<h1>🚀 Commit dApp</h1>
<p>Commit. Track. Prove.</p>

<h2>Create Commit</h2>

<input id="title" placeholder="Build app">
<input id="description" placeholder="Finish MVP">
<input id="deadline" placeholder="24 Apr">

<button class="create" onclick="createCommit()">Create</button>

<h2>Commits</h2>
<button class="load" onclick="loadCommits()">Load</button>

<ul id="list"></ul>

</div>

<script>
const API = 'https://commit-dapp.onrender.com';

async function createCommit() {
  await fetch(`${API}/commit`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      title: document.getElementById('title').value,
      description: document.getElementById('description').value,
      deadline: document.getElementById('deadline').value
    })
  });

  document.getElementById('title').value = '';
  document.getElementById('description').value = '';
  document.getElementById('deadline').value = '';

  loadCommits();
}

async function loadCommits() {
  const res = await fetch(`${API}/commits`);
  const data = await res.json();

  const list = document.getElementById('list');
  list.innerHTML = '';

  // 🔥 ВОТ ФИКС (новые сверху)
  data.reverse().forEach(c => {
    const li = document.createElement('li');
    li.innerHTML = `
      <b>${c.title}</b><br>
      ${c.description}<br>
      Status: ${c.status}<br><br>
      <div class="actions">
        <button onclick="complete(${c.id})">✅</button>
        <button onclick="fail(${c.id})">❌</button>
      </div>
    `;
    list.appendChild(li);
  });
}

async function complete(id) {
  await fetch(`${API}/commit/${id}/complete`, { method: 'POST' });
  loadCommits();
}

async function fail(id) {
  await fetch(`${API}/commit/${id}/fail`, { method: 'POST' });
  loadCommits();
}
</script>

</body>
</html>
